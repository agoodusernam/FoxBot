services:
  foxbot:
    build: .
    image: foxbot
    container_name: foxbot
    restart: "no"
    env_file: .env
    volumes:
      - .:/app                     # source live-mounted; code updates need no rebuild
      - /app/.venv                 # anonymous volume keeps the image-built venv
      - ./mongo_cert.pem:/app/mongo_cert.pem:ro
